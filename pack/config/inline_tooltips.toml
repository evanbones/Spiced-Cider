[general]
	# Never show full tooltip details, even when holding Shift.
	# default: false
	neverExpanded = false
	# Always show full tooltip details without holding Shift.
	# default: false
	alwaysExpanded = false
	# Amount of space characters between icons.
	# default: 1
	spacing = 1
	# Amount of space characters between icons when the tooltip is expanded.
	# default: 1
	expandedSpacing = 1
	# Change attribute tooltips in the 'inline_tooltips:shows_percentage' attribute tag to percentages.
	# default: true
	checkPercentageTag = true

[iconTooltips]
	# Add tooltips based on item attributes.
	# default: true
	attributeTooltips = true
	# matches r'#[0-9A-Fa-f]{6}'
	# default: #aa0000
	attributeTooltipColour = "#00aa00"
	# Add tooltips based on fuel levels.
	# default: true
	fuelTooltip = true
	# matches r'#[0-9A-Fa-f]{6}'
	# default: #ffaa00
	fuelTooltipColour = "#ffaa00"
	# Add tooltips based on amount of bees.
	# default: true
	beesTooltip = true
	# matches r'#[0-9A-Fa-f]{6}'
	# default: #ffaa00
	beeTooltipColour = "#ffaa00"
	# Add tooltips based on amount of honey.
	# default: true
	honeyTooltip = true
	# matches r'#[0-9A-Fa-f]{6}'
	# default: #ffaa00
	honeyTooltipColour = "#ffaa00"
	# Add tooltips based on light level.
	# default: true
	lightLevelTooltip = true
	# matches r'#[0-9A-Fa-f]{6}'
	# default: #ffaa00
	lightLevelTooltipColour = "#ffaa00"
	# default: true
	foodTooltip = false
	# matches r'#[0-9A-Fa-f]{6}'
	# default: #ffaa00
	foodTooltipColour = "#ffaa00"
	# default: true
	saturationTooltip = false
	# matches r'#[0-9A-Fa-f]{6}'
	# default: #ffaa00
	saturationTooltipColour = "#ffaa00"

[durabilityTooltip]
	# Add tooltips based on durability.
	# default: true
	enable = true
	# Colour of the durability tooltip.
	# matches r'#[0-9A-Fa-f]{6}'
	# default: #aaaaaa
	text_colour = "#aaaaaa"
	# Always show durability tooltip.
	# default: false
	always_show = false

[textTooltips]
	# Add tooltips to Compasses with the player's coordinates.
	# default: true
	compassTooltip = true
	# Compass tooltip colour.
	# matches r'#[0-9A-Fa-f]{6}'
	# default: #ff5555
	compassTooltipColour = "#ff5555"
	# Add tooltips based on Lodestone Compass's destination.
	# default: true
	lodestoneTooltip = true
	# Lodestone Compass tooltip colour.
	# matches r'#[0-9A-Fa-f]{6}'
	# default: #ffaa00
	lodestoneCompassTooltipColour = "#ffaa00"
	# Add tooltips based on Recovery Compass's destination.
	# default: true
	recoveryCompassTooltip = true
	# Recovery Compass tooltip colour.
	# matches r'#[0-9A-Fa-f]{6}'
	# default: #55ffff
	recoveryCompassTooltipColour = "#55ffff"

[clockTooltip]
	# Add tooltips to Clocks with the current time.
	# default: true
	current_time = true
	# Add tooltips to Clocks with the current day.
	# default: true
	day_count = true
	# Whether to show the clock in a 24 hour format.
	# default: true
	twenty_four_hour_clock = true
	# Text colour of the clock tooltip.
	# matches r'#[0-9A-Fa-f]{6}'
	# default: #ffaa00
	text_colour = "#ffaa00"

[developerOptions]
	# Show debug information when holding Alt.
	# default: false
	debugInfo = false
	# Food tooltip is hidden when AppleSkin is installed to prevent redundant information.
	# default: false
	showFoodTooltipWithAppleSkinInstalled = false
