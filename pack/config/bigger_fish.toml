[gameplay]
	# When using a vanilla Fishing Rod, replace vanilla's fishing loot table with biome specific fishing.
	# default: true
	biomeFishing = true
	# Randomize caught fish sizes
	# default: true
	fishSizes = true
	# default: true
	baitedRodsHaveDurability = true

	[gameplay.fishing_line_patterns]
		aromantic = ["#000000", "#A3A3A3", "#FFFFFF", "#3DA542"]
		genderfluid = ["#FE75A1", "#FFFFFF", "#BE16D5", "#000000", "#333EBC"]
		ace = ["#000000", "#A3A3A3", "#FFFFFF", "#800080"]
		pansexual = ["#FF218C", "#FFD800", "#0094FF"]
		aro-ace = ["#E28C00", "#ECCD00", "#FFFFFF", "#62AEDC", "#203856"]
		grimbly = ["#899EF7", "#6ADEE5", "#9DE77D", "#E2C783", "#F78888", "#EFC1EE"]
		bisexual = ["#D70071", "#9C4E97", "#0035A9", "#9C4E97"]
		bi = ["#D70071", "#9C4E97", "#0035A9", "#9C4E97"]
		raz = ["#CE5AE5", "#C52A72", "#FF5C87", "#FFD9C6", "#454545"]
		non-binary = ["#FFF430", "#FFFFFF", "#9C59D1", "#292929"]
		enby = ["#FFF430", "#FFFFFF", "#9C59D1", "#292929"]
		lesbian = ["#D62900", "#FF9B55", "#FFFFFF", "#D462A5", "#A50062"]
		pride = ["#fe0000", "#ff8e01", "#ffee00", "#028215", "#014cff", "#8b018c"]
		men = ["#447763", "#8DCAAE", "#FFFFFF", "#5B7ECD", "#283064"]
		asexual = ["#000000", "#A3A3A3", "#FFFFFF", "#800080"]
		fluid = ["#FE75A1", "#FFFFFF", "#BE16D5", "#000000", "#333EBC"]
		pan = ["#FF218C", "#FFD800", "#0094FF"]
		transgender = ["#5BCFFA", "#F5ABB9", "#FFFFFF", "#F5ABB9"]
		gay = ["#447763", "#8DCAAE", "#FFFFFF", "#5B7ECD", "#283064"]
		delilah = ["#7762AB", "#F995E0", "#FED9F5", "#F0EDFA", "#B1D8FC", "#808DCA"]
		"LGBTQ+" = ["#ED72B1", "#E93423", "#F19437", "#FFFF55", "#3E8A26", "#57BDBF", "#3A0591", "#83188A"]
		trans = ["#5BCFFA", "#F5ABB9", "#FFFFFF", "#F5ABB9"]
		women = ["#D62900", "#FF9B55", "#FFFFFF", "#D462A5", "#A50062"]
		aro = ["#000000", "#A3A3A3", "#FFFFFF", "#3DA542"]

[tooltip]
	# Show fish size in centimeters instead of inches
	# default: false
	centimeters = false
	# Show fish size in tooltip.
	# NOTE: When this option is disabled and randomize fish sizes is still enabled, the reason your fish aren't stacking won't be obvious.
	# default: true
	fishSizeTooltip = true
	# When disabled, shift is required to show fish size.
	# default: true
	showFishSizesAlways = true
	# Show what bait can be used for in a tooltip
	# default: true
	baitUsageTooltip = true
	# Show bait usage always. When disabled, shift is required to show bait usage.
	# default: false
	showBaitUsageAlways = false

[client]
	# default: false
	warnedAboutModefite = false
