[compat]
	#Fix Environmental's wisteria trees generating with sparse/patchy leaves. Requires Environmental.
	wisteriaLeafDensityFix = true
	#Disables Slime Time's slimeball item stack merging feature. Requires Slime Time.
	slimeTimeDisableItemMerging = true

[gameplay]
	#Beds don't explode outside the Overworld; instead they show a message and wake sleeping villagers.
	bedExplosionPrevention = true
	#Respawn anchors don't explode outside dimensions where they work; instead they show a message.
	respawnAnchorExplosionPrevention = true
	#End crystals can be placed on any block, not just obsidian/bedrock.
	endCrystalPlaceAnywhere = true
	#End crystals with no beam target heal nearby damaged entities and render a beam to their heal target.
	endCrystalHealing = true
	#Enchanted, named, or elytra items become "Broken" instead of being destroyed when they run out of durability.
	keepBrokenItems = true
	#Tamed wolves can be equipped with horse/animal armor as body armor.
	wolvesWearAnyArmor = true
	#Spiders switch to shooting cobweb projectiles at range when their target is trapped.
	spiderRangedWebAttacks = true
	#Removes quasi-connectivity from pistons, dispensers, and droppers.
	removeQuasiConnectivity = true

[performance]
	#Disable recipe book unlock tracking/saving/syncing entirely, since it's unused. Saves memory and disk I/O.
	disableRecipeBookTracking = true
	#Skip the redundant block shape cache rebuild that happens on every tag reload.
	skipRedundantBlockCacheRebuild = true

[vista]
	#Ignore Vista's square-aspect-ratio restriction when growing connected mirrors, so adjacent mirrors always merge regardless of shape. Requires Vista (obviously).
	vistaMirrorAlwaysConnect = true
